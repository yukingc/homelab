server {
    listen 80;
    server_name cairparavel.ddns.net caircloud.ddns.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cairparavel.ddns.net;

    ssl_certificate /etc/letsencrypt/live/cairparavel.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cairparavel.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

    location / {
        root /var/www/home;
        index index.html;
        try_files $uri $uri/ =404;
    }
    
    # location /jellyfin/ {
    #     proxy_pass http://jellyfin:8096/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     rewrite ^/jellyfin(/.*)$ $1 break;
    # }

    location /navidrome/ {
        proxy_pass http://navidrome:4533/navidrome/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /navidrome/metrics {
        proxy_pass http://localhost:4533/metrics;
        proxy_set_header Host $host;
    }

    location /cwa/ {
        proxy_pass http://calibre-web-automated:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /cwa;
    }

    # location /prometheus/ {
