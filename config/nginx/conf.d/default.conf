}

server {
    listen 443 ssl;
    server_name caircloud.ddns.net;

    # using shared certificate with cairparavel
    ssl_certificate /etc/letsencrypt/live/cairparavel.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cairparavel.ddns.net/privkey.pem;

    resolver 127.0.0.11 valid=30s;
    client_max_body_size 16G;

    location / {
        # proxy_pass http://0.0.0.0:11000$request_uri; # Adjust to match APACHE_PORT and APACHE_IP_BINDING. See https://github.com/nextcloud/all-in-one/blob/main/reverse-proxy.md#adapting-the-sample-web-server-configurations-below
        proxy_pass http://nextcloud-aio-apache:11000$request_uri; # Adjust to match APACHE_PORT and APACHE_IP_BINDING. See https://github.com/nextcloud/all-in-one/blob/main/reverse-proxy.md#adapting-the-sample-web-server-configurations-below

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header Early-Data $ssl_early_data;

        # Websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

