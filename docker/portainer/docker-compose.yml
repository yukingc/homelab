services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - homelab-net
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"
      tsdproxy.container_port: "9000"
      homepage.group: "Monitoring & Management"
      homepage.name: "Portainer"
      homepage.icon: "portainer"
      homepage.href: "https://portainer.mulley-bonito.ts.net"
      homepage.description: "Portainer is a lightweight management tool for Docker environments. It provides a simple interface for managing containers, images, networks, and volumes."

volumes:
  portainer_data:
    driver: local

networks:
  homelab-net:
    external: true
