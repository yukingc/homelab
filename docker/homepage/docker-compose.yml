services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    # ports:
    #   - 3000:3000
    volumes:
      - homepage-config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=gethomepage.dev,homepage.mulley-bonito.ts.net # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
      - PUID=501
      - PGID=20
    networks:
      - homelab-net
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"

volumes:
  homepage-config:

networks:
  homelab-net:
    external: true