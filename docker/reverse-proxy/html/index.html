<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to CairParavel</title>
  <!-- <style>

  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #fafafa;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .tile {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      text-align: center;
      font-size: 1.5rem;
      padding: 30px 10px;
      text-decoration: none;
      color: #333;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .tile:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      border-color: #aaa;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .label {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Mobile: vertical single-column layout */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr; /* single column */
      }

      .tile {
        padding: 25px 15px;
        min-height: 120px;
      }

      .emoji {
        font-size: 3rem;
      }

      .label {
        font-size: 1.2rem;
      }
    }
</style>
</head>
<body>
  <h2>🏠 Home Services</h2>
  <div class="grid">
    <a class="tile" href="/navidrome/">
      <div class="emoji">🎵</div>
      <div class="label">Navidrome</div>
    </a>

    <a class="tile" href="https://caircloud.ddns.net">
      <div class="emoji">☁️</div>
      <div class="label">Caircloud</div>
    </a>

    <!-- Uncomment when ready -->

</body>
