services:

  init-config:
    build:
      context: .
      dockerfile: Dockerfile.init
    volumes:
      - filebrowser_config:/config
    restart: "no"

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    depends_on:
      init-config:
        condition: service_completed_successfully
    volumes:
      - filebrowser_config:/config
      - /Users/piusyu/Public/Statements:/srv/Statements
      - /Users/piusyu/Public/Documents certificates:/srv/Documents-Certificates
      - filebrowser_database:/database
    networks:
      - homelab-net
    restart: unless-stopped
    labels:
      tsdproxy.enable: "true"
      homepage.group: "File Management"
      homepage.name: "File Browser"
      homepage.icon: "filebrowser"
      homepage.href: "https://filebrowser.mulley-bonito.ts.net"
      homepage.description: "A web-based file manager that allows you to manage your files and folders through a user-friendly interface. It provides features such as file uploading, downloading, editing, and sharing, making it easy to organize and access your files from anywhere." # Optional description for the homepage


volumes:
  filebrowser_config:
  filebrowser_database:

networks:
  homelab-net:
    external: true
